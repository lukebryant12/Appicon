<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Staff Sign In</title>

  <link rel="icon" href="https://gwendolynops.github.io/portal/staff_sign_in_app_icon_512.png">
  <link rel="apple-touch-icon" href="https://gwendolynops.github.io/portal/staff_sign_in_app_icon_512.png">
  <link rel="manifest" href="https://gwendolynops.github.io/portal/manifest.json">
  <meta name="theme-color" content="#62a800">

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }

    iframe {
      border: none;
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>

<iframe id="appFrame"></iframe>

<script>
  const params = new URLSearchParams(window.location.search);
  const house = params.get("house");

  const baseAppUrl = "https://script.google.com/macros/s/AKfycbxnPiIN1A5K8jJupCkIG9b2GIuSLO9sPDNuQ73ialQ0E6fqeuUzsdWC-QOJYrO7FLtL/exec";

  let finalUrl = baseAppUrl;

  if (house && house.trim() !== "") {
    finalUrl = baseAppUrl + "?house=" + encodeURIComponent(house.trim());
  }

  document.getElementById("appFrame").src = finalUrl;
</script>

</body>
</html>
